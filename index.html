// ─── Helpers ───────────────────────────────────────────────────────────────────
function MacroRing({ value, max, color, size = 80, stroke = 8, label, unit }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const dash = Math.min(value / max, 1) * circ;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e1e1e" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.6s ease" }} />
        <text x="50%" y="50%" dominantBaseline="middle" textAnchor="middle"
          style={{ fill: "#f0ede6", fontSize: 15, fontWeight: 900, fontFamily: "'Barlow Condensed',sans-serif", transform: "rotate(90deg)", transformOrigin: "center" }}>
          {value}
        </text>
      </svg>
      <div style={{ fontSize: 9, color: "#555", letterSpacing: 1, fontWeight: 700, textAlign: "center" }}>{label}<br /><span style={{ color: "#333" }}>/{max}{unit}</span></div>
    </div>
  );
}

// ─── Rest Timer ────────────────────────────────────────────────────────────────
function RestTimer({ onClose }) {
  const [seconds, setSeconds] = useState(90);
  const [running, setRunning] = useState(true);
  const [initial, setInitial] = useState(90);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running && seconds > 0) {
      intervalRef.current = setInterval(() => setSeconds(s => s - 1), 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, seconds]);

  const pct = seconds / initial;
  const r = 54; const circ = 2 * Math.PI * r;
  const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  const setTimer = (s) => { setInitial(s); setSeconds(s); setRunning(true); };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 100, fontFamily: "'Barlow Condensed',sans-serif" }}>
      <div style={{ fontSize: 11, letterSpacing: 3, color: "#e8ff6b", fontWeight: 700, marginBottom: 20 }}>REST TIMER</div>
      <svg width={130} height={130} style={{ transform: "rotate(-90deg)", marginBottom: 20 }}>
        <circle cx={65} cy={65} r={r} fill="none" stroke="#1e1e1e" strokeWidth={10} />
        <circle cx={65} cy={65} r={r} fill="none" stroke={seconds <= 10 ? "#ff6b6b" : "#e8ff6b"} strokeWidth={10}
          strokeDasharray={`${pct * circ} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.9s linear, stroke 0.3s" }} />
        <text x="50%" y="50%" dominantBaseline="middle" textAnchor="middle"
          style={{ fill: "#f0ede6", fontSize: 30, fontWeight: 900, fontFamily: "'Barlow Condensed',sans-serif", transform: "rotate(90deg)", transformOrigin: "center" }}>
          {fmt(seconds)}
        </text>
      </svg>
      {seconds === 0 && <div style={{ fontSize: 22, fontWeight: 900, color: "#e8ff6b", marginBottom: 16 }}>REST DONE!</div>}
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        {[60, 90, 120, 180].map(s => (
          <button key={s} onClick={() => setTimer(s)}
            style={{ padding: "8px 14px", borderRadius: 8, border: `1px solid ${initial===s?"#e8ff6b":"#2a2a2a"}`, background: initial===s?"#1a2a0a":"#141414", color: initial===s?"#e8ff6b":"#555", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
            {s}s
          </button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        <button onClick={() => setRunning(r => !r)}
          style={{ padding: "12px 28px", borderRadius: 10, border: "none", background: "#1a2a1a", color: "#e8ff6b", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
          {running ? "PAUSE" : "RESUME"}
        </button>
        <button onClick={onClose}
          style={{ padding: "12px 28px", borderRadius: 10, border: "none", background: "#2a1a1a", color: "#ff6b6b", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
          CLOSE
        </button>
      </div>
    </div>
  );
}

// ─── AI Photo Food Logger ──────────────────────────────────────────────────────
function PhotoFoodLogger({ onAdd, onClose }) {
  const [stage, setStage] = useState("upload"); // upload | analyzing | result | error
  const [preview, setPreview] = useState(null);
  const [result, setResult] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const fileRef = useRef(null);

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const b64 = ev.target.result.split(",")[1];
      setPreview(ev.target.result);
      setStage("analyzing");
      try {
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: file.type || "image/jpeg", data: b64 } },
                { type: "text", text: `Analyze this food image and estimate nutritional content. Respond ONLY with a JSON object, no markdown, no backticks, no extra text. Format: {"name":"meal name","cal":number,"p":number,"c":number,"f":number,"items":["item1","item2"]} where cal=calories, p=protein grams, c=carb grams, f=fat grams.` }
              ]
            }]
          })
        });
        const data = await resp.json();
        const text = data.content?.find(b => b.type === "text")?.text || "";
        const clean = text.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);
        setResult(parsed);
        setStage("result");
      } catch (err) {
        setErrorMsg("Couldn't analyze the image. Try a clearer photo.");
        setStage("error");
      }
    };
    reader.readAsDataURL(file);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", zIndex: 100, display: "flex", flexDirection: "column", fontFamily: "'Barlow Condensed',sans-serif", overflowY: "auto" }}>
      <div style={{ padding: "24px 20px 100px", maxWidth: 480, margin: "0 auto", width: "100%" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <div style={{ fontSize: 11, letterSpacing: 3, color: "#e8ff6b", fontWeight: 700 }}>AI FOOD SCANNER</div>
            <div style={{ fontSize: 24, fontWeight: 900 }}>SNAP YOUR MEAL</div>
          </div>
          <button onClick={onClose} style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 8, padding: "8px 14px", color: "#888", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>✕ CLOSE</button>
        </div>

        {stage === "upload" && (
          <div>
            <div style={{ background: "#0f1a0f", border: "2px dashed #2a4a2a", borderRadius: 16, padding: 40, textAlign: "center", marginBottom: 16, cursor: "pointer" }} onClick={() => fileRef.current?.click()}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>📸</div>
              <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 6 }}>TAP TO UPLOAD PHOTO</div>
              <div style={{ fontSize: 12, color: "#555", fontFamily: "'Barlow',sans-serif" }}>Take a photo of your meal or choose from library</div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display: "none" }} />
            <div style={{ background: "#0f1a0f", border: "1px solid #1e2e1e", borderRadius: 10, padding: "10px 14px", display: "flex", gap: 10 }}>
              <span>🔬</span>
              <div style={{ fontSize: 11, color: "#6b9b6b", fontFamily: "'Barlow',sans-serif", lineHeight: 1.5 }}>Claude's AI will analyze your photo and estimate calories, protein, carbs, and fat automatically.</div>
            </div>
          </div>
        )}

        {stage === "analyzing" && (
          <div style={{ textAlign: "center", paddingTop: 40 }}>
            {preview && <img src={preview} alt="food" style={{ width: "100%", borderRadius: 16, marginBottom: 24, maxHeight: 260, objectFit: "cover" }} />}
            <div style={{ fontSize: 36, marginBottom: 16 }}>🔬</div>
            <div style={{ fontSize: 20, fontWeight: 900, color: "#e8ff6b", marginBottom: 8 }}>ANALYZING…</div>
            <div style={{ fontSize: 13, color: "#555", fontFamily: "'Barlow',sans-serif" }}>Claude is estimating your macros</div>
          </div>
        )}

        {stage === "result" && result && (
          <div>
            {preview && <img src={preview} alt="food" style={{ width: "100%", borderRadius: 16, marginBottom: 16, maxHeight: 240, objectFit: "cover" }} />}
            <div style={{ background: "#0f1a0f", border: "1px solid #2a4a2a", borderRadius: 14, padding: 18, marginBottom: 16 }}>
              <div style={{ fontSize: 22, fontWeight: 900, marginBottom: 4 }}>{result.name}</div>
              <div style={{ fontSize: 11, color: "#555", fontFamily: "'Barlow',sans-serif", marginBottom: 14 }}>{result.items?.join(" · ")}</div>
              <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
                <div style={{ flex: 1, background: "#141414", borderRadius: 10, padding: "12px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 26, fontWeight: 900, color: "#e8ff6b" }}>{result.cal}</div>
                  <div style={{ fontSize: 9, color: "#555", fontWeight: 700, letterSpacing: 1 }}>KCAL</div>
                </div>
                {[["PROTEIN", result.p, "#e8ff6b"], ["CARBS", result.c, "#6bffb8"], ["FAT", result.f, "#ff9f6b"]].map(([l, v, c]) => (
                  <div key={l} style={{ flex: 1, background: "#141414", borderRadius: 10, padding: "12px 8px", textAlign: "center" }}>
                    <div style={{ fontSize: 26, fontWeight: 900, color: c }}>{v}g</div>
                    <div style={{ fontSize: 9, color: "#555", fontWeight: 700, letterSpacing: 1 }}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 10, color: "#555", fontFamily: "'Barlow',sans-serif", fontStyle: "italic" }}>⚠ AI estimates — actual values may vary</div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { onAdd(result); onClose(); }}
                style={{ flex: 1, background: "#e8ff6b", color: "#0d0d0d", border: "none", padding: 16, borderRadius: 10, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
                LOG THIS MEAL ✓
              </button>
              <button onClick={() => { setStage("upload"); setPreview(null); setResult(null); }}
                style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", padding: "16px 18px", borderRadius: 10, color: "#888", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                RETAKE
              </button>
            </div>
          </div>
        )}

        {stage === "error" && (
          <div style={{ textAlign: "center", paddingTop: 40 }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>⚠️</div>
            <div style={{ fontSize: 18, fontWeight: 900, color: "#ff6b6b", marginBottom: 8 }}>{errorMsg}</div>
            <button onClick={() => setStage("upload")}
              style={{ background: "#e8ff6b", color: "#0d0d0d", border: "none", padding: "12px 28px", borderRadius: 10, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 15, fontWeight: 800, cursor: "pointer", marginTop: 16 }}>
              TRY AGAIN
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Macro Target Editor ───────────────────────────────────────────────────────
function MacroEditor({ targets, onSave, onClose }) {
  const [vals, setVals] = useState({ ...targets });
  const set = (k, v) => setVals(p => ({ ...p, [k]: Math.max(0, parseInt(v) || 0) }));
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 100, display: "flex", alignItems: "flex-end", fontFamily: "'Barlow Condensed',sans-serif" }}>
      <div style={{ width: "100%", maxWidth: 480, margin: "0 auto", background: "#111", borderRadius: "20px 20px 0 0", padding: "24px 20px 40px", borderTop: "1px solid #1e1e1e" }}>
        <div style={{ fontSize: 11, letterSpacing: 3, color: "#e8ff6b", fontWeight: 700, marginBottom: 4 }}>CUSTOMIZE</div>
        <div style={{ fontSize: 26, fontWeight: 900, marginBottom: 20 }}>MACRO TARGETS</div>
        {[
          { key: "cal", label: "Calories", unit: "kcal", color: "#f0ede6" },
          { key: "p", label: "Protein", unit: "g", color: "#e8ff6b" },
          { key: "c", label: "Carbohydrates", unit: "g", color: "#6bffb8" },
          { key: "f", label: "Fat", unit: "g", color: "#ff9f6b" },
        ].map(({ key, label, unit, color }) => (
          <div key={key} style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <div style={{ fontSize: 14, fontWeight: 800, color }}>{label}</div>
              <div style={{ fontSize: 11, color: "#555" }}>per day</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={() => set(key, vals[key] - (key==="cal"?50:5))}
                style={{ width: 40, height: 40, borderRadius: 8, background: "#1a1a1a", border: "1px solid #2a2a2a", color: "#888", fontSize: 20, fontWeight: 900, cursor: "pointer" }}>−</button>
              <input type="number" value={vals[key]} onChange={e => set(key, e.target.value)}
                style={{ flex: 1, background: "#1a1a1a", border: `1px solid ${color}44`, borderRadius: 8, padding: "10px 14px", color: color, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 22, fontWeight: 900, textAlign: "center" }} />
              <div style={{ fontSize: 12, color: "#555", fontWeight: 700, minWidth: 30 }}>{unit}</div>
              <button onClick={() => set(key, vals[key] + (key==="cal"?50:5))}
                style={{ width: 40, height: 40, borderRadius: 8, background: "#1a1a1a", border: "1px solid #2a2a2a", color: "#888", fontSize: 20, fontWeight: 900, cursor: "pointer" }}>+</button>
            </div>
          </div>
        ))}
        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <button onClick={() => { onSave(vals); onClose(); }}
            style={{ flex: 1, background: "#e8ff6b", color: "#0d0d0d", border: "none", padding: 16, borderRadius: 10, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>
            SAVE TARGETS
          </button>
          <button onClick={onClose}
            style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", padding: "16px 18px", borderRadius: 10, color: "#888", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
            CANCEL
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
export default function BackCountryFit() {
  const [activeTab, setActiveTab] = useState("dashboard");
  const [selectedProgram, setSelectedProgram] = useState(null);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [loaded, setLoaded] = useState(false);
  const [showTimer, setShowTimer] = useState(false);
  const [showPhotoLogger, setShowPhotoLogger] = useState(false);
  const [showMacroEditor, setShowMacroEditor] = useState(false);
  const [appData, setAppData] = useState(DEFAULT_STATE);

  useEffect(() => {
    async function load() {
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result?.value) setAppData({ ...DEFAULT_STATE, ...JSON.parse(result.value) });
      } catch {}
      setLoaded(true);
    }
    load();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify({ ...appData, lastSaved: new Date().toISOString() }));
        setSaveStatus("saved");
        setTimeout(() => setSaveStatus("idle"), 2000);
      } catch { setSaveStatus("error"); }
    }, 600);
    return () => clearTimeout(t);
  }, [appData, loaded]);

  const update = useCallback((patch) => setAppData(p => ({ ...p, ...patch })), []);

  const toggleSet = useCallback((exIdx, setIdx) => {
    const key = `${exIdx}-${setIdx}`;
    setAppData(p => ({ ...p, completedSets: { ...p.completedSets, [key]: !p.completedSets[key] } }));
    setShowTimer(true);
  }, []);

  const toggleMeal = useCallback((idx) => setAppData(p => ({ ...p, loggedMeals: { ...p.loggedMeals, [idx]: !p.loggedMeals[idx] } })), []);
  const setWater = useCallback((val) => setAppData(p => ({ ...p, water: typeof val === "function" ? val(p.water) : val })), []);
  const resetDay = useCallback(() => setAppData(p => ({ ...p, completedSets: {}, loggedMeals: {}, water: 0, photoMeals: [] })), []);

  const addPhotoMeal = useCallback((meal) => {
    setAppData(p => ({ ...p, photoMeals: [...(p.photoMeals||[]), { ...meal, id: Date.now(), time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) }] }));
  }, []);

  const removePhotoMeal = useCallback((id) => {
    setAppData(p => ({ ...p, photoMeals: p.photoMeals.filter(m => m.id !== id) }));
  }, []);

  const saveMacroTargets = useCallback((t) => setAppData(p => ({ ...p, macroTargets: t })), []);

  const logWeight = useCallback((w) => {
    const entry = { date: new Date().toLocaleDateString(), weight: parseFloat(w) };
    setAppData(p => {
      const log = [...(p.weightLog || [])];
      const today = log.findIndex(e => e.date === entry.date);
      if (today >= 0) log[today] = entry; else log.push(entry);
      return { ...p, weightLog: log.slice(-30) };
    });
  }, []);

  const targets = appData.macroTargets || DEFAULT_STATE.macroTargets;

  const consumed = [
    ...mealPlan.filter((_, i) => appData.loggedMeals[i]).map(m => m.macros),
    ...(appData.photoMeals || []).map(m => ({ cal: m.cal, p: m.p, c: m.c, f: m.f }))
  ].reduce((acc, m) => ({ cal: acc.cal + m.cal, p: acc.p + m.p, c: acc.c + m.c, f: acc.f + m.f }), { cal: 0, p: 0, c: 0, f: 0 });

  if (!loaded) return (
    <div style={{ background: "#0d0d0d", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16, fontFamily: "'Barlow Condensed',sans-serif" }}>

        .pulse{animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,255,107,0.4);}50%{box-shadow:0 0 0 8px rgba(232,255,107,0);}}
        .set-btn{width:38px;height:38px;border-radius:50%;border:2px solid #2e5585;background:#224270;color:#888;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}

        .water-btn{background:none;border:none;cursor:pointer;transition:transform 0.15s;}

        .confetti-piece{position:fixed;top:-10px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:200;}
        @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

      {showTimer && <RestTimer onClose={() => setShowTimer(false)} />}
      {showPhotoLogger && <PhotoFoodLogger onAdd={addPhotoMeal} onClose={() => setShowPhotoLogger(false)} />}

}

  const handleSelect = (id) => { setSelectedProgram(id); setStage("preview"); };
  const handleBack = () => {
    if (stage === "detail") setStage("preview");
    else { setSelectedProgram(null); setStage("list"); }
  };

  if (stage !== "list" && selectedProgram) {
    const p = programs.find(pr => pr.id === selectedProgram);
    const d = programDetails[selectedProgram];

    // ── Before You Start preview ──────────────────────────────────────────────
    if (stage === "preview") return (
      <div className="fade-in">

// ─── Confetti ──────────────────────────────────────────────────────────────────
function Confetti() {
  const pieces = useRef([]);
  const colors = ["#e8ff6b","#6bffb8","#ff9f6b","#6bbaff","#ff6b9f","#ffffff","#ffe06b"];
  if (pieces.current.length === 0) {
    pieces.current = Array.from({ length: 80 }, (_, i) => ({
      id: i,
      left: Math.random() * 100,
      width: 6 + Math.random() * 8,
      height: 10 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      delay: Math.random() * 1.2,
      duration: 2.5 + Math.random() * 1.5,
    }));
  }
  return (
    <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 199 }}>
      {pieces.current.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left: `${p.left}%`, width: p.width, height: p.height,
          background: p.color, animationDelay: `${p.delay}s`,
          animationDuration: `${p.duration}s`,
        }} />
      ))}
    </div>
  );
}

// ─── Today's Workout ───────────────────────────────────────────────────────────
function TodayWorkout({ completedSets, toggleSet, resetDay, setShowTimer }) {
  const totalSets = todayExercises.reduce((a, e) => a + parseInt(e.sets), 0);
  const doneSets = Object.values(completedSets).filter(Boolean).length;
  const pct = Math.round((doneSets / totalSets) * 100);
  const [showConfetti, setShowConfetti] = useState(false);
  const prevPct = useRef(pct);

  useEffect(() => {
    if (pct === 100 && prevPct.current !== 100) {
      setShowConfetti(true);
      setTimeout(() => setShowConfetti(false), 4500);
    }
    prevPct.current = pct;
  }, [pct]);

  return (
    <div className="fade-in">
      {showConfetti && <Confetti />}
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <div style={{ fontSize: 12, color: "#7a90b0", letterSpacing: 1, fontWeight: 700 }}>WORKOUT PROGRESS</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <button onClick={() => setShowTimer(true)} style={{ background: "#1a2a1a", border: "1px solid #2a4a2a", borderRadius: 6, padding: "4px 10px", color: "#e8ff6b", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 10, fontWeight: 700, cursor: "pointer", letterSpacing: 1 }}>⏱ TIMER</button>
            <button onClick={() => { resetDay(); setShowConfetti(false); }} style={{ background: "none", border: "1px solid #3a2e20", borderRadius: 6, padding: "4px 10px", color: "#7a90b0", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 9, fontWeight: 700, letterSpacing: 1, cursor: "pointer" }}>RESET</button>
            <div style={{ fontSize: 14, fontWeight: 800, color: "#e8ff6b" }}>{pct}%</div>
          </div>
        </div>
        <div className="progress-bar"><div className="progress-fill" style={{ width: `${pct}%` }} /></div>
        <div style={{ fontSize: 11, color: "#7a90b0", marginTop: 6 }}>{doneSets} / {totalSets} sets · timer starts on each set</div>
      </div>
      <div style={{ background: "#1a3458", border: "1px solid #2a3828", borderRadius: 10, padding: "10px 14px", marginBottom: 16, display: "flex", gap: 10 }}>

        <div style={{ fontSize: 11, color: "#6b9b6b", fontFamily: "'Barlow',sans-serif", lineHeight: 1.5 }}><strong style={{ color: "#8abb8a" }}>Science Note:</strong> RIR (Reps In Reserve) targets proximity to failure for optimal hypertrophy without excessive fatigue accumulation.</div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

          return (

                <div><div style={{ fontSize: 18, fontWeight: 800, lineHeight: 1 }}>{ex.name}</div><div style={{ fontSize: 10, color: "#7a90b0", letterSpacing: 1, fontWeight: 700, marginTop: 2 }}>{ex.muscle}</div></div>

            <div style={{ height: 8, background: "#1a2a3a", borderRadius: 4, overflow: "hidden", margin: "16px 0 20px" }}><div style={{ height: "100%", width: `${(water/WATER_GOAL)*100}%`, background: "linear-gradient(90deg,#4a9abf,#6bbaff)", borderRadius: 4, transition: "width 0.4s" }} /></div>
            <div style={{ display: "flex", gap: 16, justifyContent: "center", alignItems: "center" }}>
              <button className="water-btn" onClick={() => setWater(w => Math.max(0,w-1))} style={{ width: 52, height: 52, borderRadius: "50%", background: "#1a2a3a", border: "2px solid #2a3a4a", color: "#6bbaff", fontSize: 24, fontWeight: 900, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
              <div style={{ fontSize: 13, color: "#4a7a9b", fontWeight: 700, letterSpacing: 1 }}>1 CUP</div>
              <button className="water-btn" onClick={() => setWater(w => Math.min(WATER_GOAL+4,w+1))} style={{ width: 52, height: 52, borderRadius: "50%", background: "#1a3a5a", border: "2px solid #2a5a8a", color: "#6bbaff", fontSize: 24, fontWeight: 900, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
            </div>
          </div>
          <div style={{ background: "#141414", border: "1px solid #1e1e1e", borderRadius: 14, padding: 16, marginBottom: 14 }}>
            <div style={{ fontSize: 11, letterSpacing: 2, color: "#555", fontWeight: 700, marginBottom: 12 }}>CUPS LOGGED</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {Array.from({ length: WATER_GOAL }).map((_,i) => (
                <button key={i} className="water-btn" onClick={() => setWater(i+1)} style={{ width: 40, height: 40, borderRadius: 8, background: i<water?"#1a3a5a":"#1a1a1a", border: `2px solid ${i<water?"#6bbaff":"#2a2a2a"}`, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s" }}>
                  {i < water ? "💧" : "○"}
                </button>
              ))}
            </div>
          </div>
          <div style={{ background: "#0f141a", border: "1px solid #1a2028", borderRadius: 12, padding: "12px 14px" }}>
            <div style={{ fontSize: 11, letterSpacing: 2, color: "#555", fontWeight: 700, marginBottom: 10 }}>HYDRATION TIPS</div>
            {[{tip:"Drink 1–2 cups before each workout",icon:"⚡"},{tip:"Aim for pale yellow urine — the best hydration indicator",icon:"🔬"},{tip:"Add electrolytes on heavy sweat days (quad rides, skidoo)",icon:"🏔️"}].map((t,i) => (
              <div key={i} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: i<2?"1px solid #1a1a1a":"none" }}>
                <span style={{ fontSize: 14 }}>{t.icon}</span>
                <div style={{ fontSize: 11, color: "#6b8a9b", fontFamily: "'Barlow',sans-serif", lineHeight: 1.4 }}>{t.tip}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Outdoor (GPS Tracker + Strava) ────────────────────────────────────────────
function Outdoor({ appData, update }) {
  const [section, setSection] = useState("track"); // track | history | strava
  const [trackState, setTrackState] = useState("idle"); // idle | active | paused | done
  const [activityType, setActivityType] = useState("run");
  const [elapsed, setElapsed] = useState(0);
  const [route, setRoute] = useState([]);
  const [distance, setDistance] = useState(0);
  const [currentPos, setCurrentPos] = useState(null);
  const [gpsError, setGpsError] = useState("");
  const [saveName, setSaveName] = useState("");
  const [showSave, setShowSave] = useState(false);
  const [stravaClientId, setStravaClientId] = useState(appData.stravaClientId || "");
  const [stravaSecret, setStravaSecret] = useState("");
  const [showStravaSetup, setShowStravaSetup] = useState(false);
  const intervalRef = useRef(null);
  const watchRef = useRef(null);
  const mapRef = useRef(null);
  const leafletMapRef = useRef(null);
  const polylineRef = useRef(null);
  const markerRef = useRef(null);

  const activities = appData.activities || [];

  // Haversine distance in km
  const haversine = (a, b) => {
    const R = 6371, dLat = (b.lat - a.lat) * Math.PI/180, dLon = (b.lng - a.lng) * Math.PI/180;
    const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  };

  const fmt = s => `${String(Math.floor(s/3600)).padStart(2,"0")}:${String(Math.floor((s%3600)/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const fmtDist = d => d >= 1 ? `${d.toFixed(2)} km` : `${Math.round(d*1000)} m`;
  const pace = distance > 0 && elapsed > 0 ? (elapsed/60)/distance : 0;

  // Init Leaflet map
  useEffect(() => {
    if (section !== "track" || leafletMapRef.current) return;
    const timer = setTimeout(() => {
      if (!mapRef.current || leafletMapRef.current) return;
      // Load Leaflet if not loaded
      if (!window.L) {
        const link = document.createElement("link");
        link.rel = "stylesheet"; link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
        document.head.appendChild(link);
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
        script.onload = () => initMap();
        document.head.appendChild(script);
      } else { initMap(); }
    }, 200);
    return () => clearTimeout(timer);
  }, [section]);

  const initMap = () => {
    if (!mapRef.current || leafletMapRef.current) return;
    const center = currentPos ? [currentPos.lat, currentPos.lng] : [47.5615, -52.7126]; // NL default
    const map = window.L.map(mapRef.current, { zoomControl: false, attributionControl: false }).setView(center, 15);
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    window.L.control.zoom({ position: "bottomright" }).addTo(map);
    const poly = window.L.polyline([], { color: "#e8ff6b", weight: 4, opacity: 0.9 }).addTo(map);
    const icon = window.L.divIcon({ html: `<div style="width:14px;height:14px;background:#e8ff6b;border:3px solid #162e4a;border-radius:50%;box-shadow:0 0 8px #e8ff6b88;"></div>`, iconSize:[14,14], iconAnchor:[7,7], className:"" });
    const marker = window.L.marker(center, { icon }).addTo(map);
    leafletMapRef.current = map;
    polylineRef.current = poly;
    markerRef.current = marker;
  };

  // Update map when route changes
  useEffect(() => {
    if (!leafletMapRef.current || route.length === 0) return;
    const latlngs = route.map(p => [p.lat, p.lng]);
    polylineRef.current?.setLatLngs(latlngs);
    const last = route[route.length - 1];
    markerRef.current?.setLatLng([last.lat, last.lng]);
    leafletMapRef.current.setView([last.lat, last.lng], leafletMapRef.current.getZoom());
  }, [route]);

  const startTracking = () => {
    setGpsError("");
    if (!navigator.geolocation) { setGpsError("GPS not available on this device."); return; }
    setTrackState("active");
    setElapsed(0); setRoute([]); setDistance(0);
    intervalRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
    watchRef.current = navigator.geolocation.watchPosition(
      pos => {
        const point = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setCurrentPos(point);
        setRoute(prev => {
          const next = [...prev, point];
          if (prev.length > 0) setDistance(d => d + haversine(prev[prev.length-1], point));
          return next;
        });
      },
      err => setGpsError("GPS error: " + err.message),
      { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
    );
  };

  const pauseTracking = () => {
    setTrackState("paused");
    clearInterval(intervalRef.current);
    navigator.geolocation.clearWatch(watchRef.current);
  };

  const resumeTracking = () => {
    setTrackState("active");
    intervalRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
    watchRef.current = navigator.geolocation.watchPosition(
      pos => {
        const point = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setCurrentPos(point);
        setRoute(prev => {
          const next = [...prev, point];
          if (prev.length > 0) setDistance(d => d + haversine(prev[prev.length-1], point));
          return next;
        });
      },
      err => setGpsError("GPS error: " + err.message),
      { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
    );
  };

  const stopTracking = () => {
    clearInterval(intervalRef.current);
    navigator.geolocation.clearWatch(watchRef.current);
    setTrackState("done");
    setShowSave(true);
    setSaveName(`${activityType === "run" ? "Run" : activityType === "hike" ? "Hike" : "Ride"} — ${new Date().toLocaleDateString()}`);
  };

  const saveActivity = () => {
    const activity = {
      id: Date.now(), type: activityType, name: saveName,
      date: new Date().toLocaleDateString(), distance: parseFloat(distance.toFixed(3)),
      duration: elapsed, route,
    };
    update({ activities: [activity, ...activities].slice(0, 50) });
    setShowSave(false); setTrackState("idle"); setRoute([]); setDistance(0); setElapsed(0);
  };

  const deleteActivity = (id) => update({ activities: activities.filter(a => a.id !== id) });

  const typeIcon = { run: "🏃", hike: "🥾", ride: "🚵" };
  const typeLabel = { run: "RUN", hike: "HIKE", ride: "RIDE" };

  return (
    <div className="fade-in" style={{ paddingBottom: 20 }}>
      {/* Section tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, padding: "0 20px" }}>
        {[["track","🗺 TRACK"],["history","📋 HISTORY"],["strava","🟠 STRAVA"]].map(([id, label]) => (
          <button key={id} onClick={() => setSection(id)}
            style={{ flex: 1, padding: "9px 4px", borderRadius: 8, border: "none", cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 11, fontWeight: 800, letterSpacing: 1, background: section===id ? "#e8ff6b" : "#1e3d65", color: section===id ? "#162e4a" : "#7a90b0", transition: "all 0.2s" }}>
            {label}
          </button>
        ))}
      </div>

      {/* ── TRACK ── */}
      {section === "track" && (
        <div>
          {/* Activity type selector */}
          {trackState === "idle" && (
            <div style={{ display: "flex", gap: 8, marginBottom: 12, padding: "0 20px" }}>
              {["run","hike","ride"].map(t => (
                <button key={t} onClick={() => setActivityType(t)}
                  style={{ flex: 1, padding: "10px 4px", borderRadius: 10, border: `2px solid ${activityType===t?"#e8ff6b":"#3a5f8a"}`, background: activityType===t?"#1a3458":"#1e3d65", cursor: "pointer", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 13, fontWeight: 800, color: activityType===t?"#e8ff6b":"#7a90b0", transition: "all 0.2s" }}>
                  {typeIcon[t]} {typeLabel[t]}
                </button>
              ))}
            </div>
          )}

          {/* Map */}
          <div ref={mapRef} style={{ width: "100%", height: 280, background: "#1a1810", position: "relative" }}>
            {!window.L && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8 }}><div style={{ fontSize: 24 }}>🗺</div><div style={{ fontSize: 11, color: "#7a90b0", fontWeight: 700, letterSpacing: 1 }}>MAP LOADING…</div></div>}
          </div>

          {/* Live stats */}
          {trackState !== "idle" && (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, margin: "12px 20px 0", }}>
              {[["TIME", fmt(elapsed)], ["DIST", fmtDist(distance)], ["PACE", pace > 0 ? `${Math.floor(pace)}:${String(Math.round((pace%1)*60)).padStart(2,"0")}/km` : "--"]].map(([l,v]) => (
                <div key={l} style={{ background: "#1e3d65", border: "1px solid #3a5f8a", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 18, fontWeight: 900, color: "#e8ff6b", lineHeight: 1 }}>{v}</div>
                  <div style={{ fontSize: 9, color: "#7a90b0", fontWeight: 700, letterSpacing: 1, marginTop: 2 }}>{l}</div>
                </div>
              ))}
            </div>
          )}

          {gpsError && <div style={{ margin: "10px 20px 0", fontSize: 11, color: "#ff9f6b", fontFamily: "'Barlow',sans-serif" }}>⚠ {gpsError}</div>}

          {/* Controls */}
          <div style={{ padding: "12px 20px 0" }}>
            {trackState === "idle" && (
              <button onClick={startTracking} className="pulse" style={{ width: "100%", background: "#e8ff6b", color: "#162e4a", border: "none", padding: 16, borderRadius: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 18, fontWeight: 900, cursor: "pointer", letterSpacing: 1 }}>
                START {typeLabel[activityType]} →
              </button>
            )}
            {trackState === "active" && (
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={pauseTracking} style={{ flex: 1, background: "#3a5f8a", border: "1px solid #3e3628", padding: 14, borderRadius: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, color: "#e8ff6b", cursor: "pointer" }}>⏸ PAUSE</button>
                <button onClick={stopTracking} style={{ flex: 1, background: "#3e1818", border: "1px solid #5e2828", padding: 14, borderRadius: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, color: "#ff9f6b", cursor: "pointer" }}>⏹ FINISH</button>
              </div>
            )}
            {trackState === "paused" && (
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={resumeTracking} style={{ flex: 2, background: "#1a3458", border: "1px solid #2e4828", padding: 14, borderRadius: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, color: "#6bffb8", cursor: "pointer" }}>▶ RESUME</button>
                <button onClick={stopTracking} style={{ flex: 1, background: "#3e1818", border: "1px solid #5e2828", padding: 14, borderRadius: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, color: "#ff9f6b", cursor: "pointer" }}>⏹ END</button>
              </div>
            )}
            {trackState === "done" && !showSave && (
              <button onClick={() => setTrackState("idle")} style={{ width: "100%", background: "#1e3d65", border: "1px solid #3a5f8a", padding: 14, borderRadius: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, color: "#e8ff6b", cursor: "pointer" }}>NEW ACTIVITY</button>
            )}
          </div>

          {/* Save modal */}
          {showSave && (
            <div style={{ margin: "12px 20px 0", background: "#1a3458", border: "1px solid #2a4828", borderRadius: 14, padding: 16 }}>
              <div style={{ fontSize: 13, letterSpacing: 2, color: "#6b9b6b", fontWeight: 700, marginBottom: 10 }}>SAVE ACTIVITY</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                {[["DISTANCE", fmtDist(distance)], ["TIME", fmt(elapsed)], ["TYPE", typeLabel[activityType]]].map(([l,v]) => (
                  <div key={l} style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 16, fontWeight: 900, color: "#e8ff6b" }}>{v}</div>
                    <div style={{ fontSize: 9, color: "#7a90b0", fontWeight: 700 }}>{l}</div>
                  </div>
                ))}
              </div>
              <input value={saveName} onChange={e => setSaveName(e.target.value)}
                style={{ width: "100%", background: "#162e4a", border: "1px solid #3a5f8a", borderRadius: 8, padding: "10px 12px", color: "#f0ede6", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 15, marginBottom: 10 }} />
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={saveActivity} style={{ flex: 2, background: "#e8ff6b", color: "#162e4a", border: "none", padding: 12, borderRadius: 8, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>SAVE ✓</button>
                <button onClick={() => { setShowSave(false); setTrackState("idle"); }} style={{ flex: 1, background: "none", border: "1px solid #3a5f8a", padding: 12, borderRadius: 8, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 13, fontWeight: 700, color: "#7a90b0", cursor: "pointer" }}>DISCARD</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── HISTORY ── */}
      {section === "history" && (
        <div style={{ padding: "0 20px" }}>
          {activities.length === 0 ? (
            <div style={{ textAlign: "center", padding: "40px 20px" }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>🥾</div>
              <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 6 }}>NO ACTIVITIES YET</div>
              <div style={{ fontSize: 12, color: "#7a90b0", fontFamily: "'Barlow',sans-serif" }}>Start a run, hike, or ride on the Track tab to log your first one.</div>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ fontSize: 11, letterSpacing: 2, color: "#7a90b0", fontWeight: 700, marginBottom: 4 }}>{activities.length} ACTIVITIES LOGGED</div>
              {activities.map(a => (
                <div key={a.id} style={{ background: "#1e3d65", border: "1px solid #3a5f8a", borderRadius: 14, padding: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      <div style={{ fontSize: 28 }}>{typeIcon[a.type]}</div>
                      <div>
                        <div style={{ fontSize: 16, fontWeight: 800, lineHeight: 1 }}>{a.name}</div>
                        <div style={{ fontSize: 10, color: "#7a90b0", fontWeight: 700, letterSpacing: 1, marginTop: 2 }}>{a.date}</div>
                      </div>
                    </div>
                    <button onClick={() => deleteActivity(a.id)} style={{ background: "none", border: "none", color: "#5a3a3a", fontSize: 16, cursor: "pointer", padding: "2px 6px" }}>✕</button>
                  </div>
                  <div style={{ display: "flex", gap: 14 }}>
                    {[["DIST", fmtDist(a.distance)], ["TIME", fmt(a.duration)], ["PACE", a.duration > 0 && a.distance > 0 ? `${Math.floor((a.duration/60)/a.distance)}:${String(Math.round(((a.duration/60)/a.distance%1)*60)).padStart(2,"0")}/km` : "--"]].map(([l,v]) => (
                      <div key={l}>
                        <div style={{ fontSize: 18, fontWeight: 900, color: "#e8ff6b" }}>{v}</div>
                        <div style={{ fontSize: 9, color: "#7a90b0", fontWeight: 700, letterSpacing: 1 }}>{l}</div>
                      </div>
                    ))}
                    {a.stravaId && <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#fc4c02", fontWeight: 700 }}>🟠 STRAVA</div>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── STRAVA ── */}
      {section === "strava" && (
        <div style={{ padding: "0 20px" }}>
          {/* Connection status */}
          <div style={{ background: appData.stravaConnected ? "#1a2e18" : "#1e3d65", border: `1px solid ${appData.stravaConnected ? "#2a4828" : "#2e5585"}`, borderRadius: 14, padding: 18, marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: appData.stravaConnected ? 0 : 12 }}>
              <div style={{ fontSize: 36 }}>🟠</div>
              <div>
                <div style={{ fontSize: 20, fontWeight: 900 }}>Strava</div>
                <div style={{ fontSize: 11, color: appData.stravaConnected ? "#6bffb8" : "#ff9f6b", fontWeight: 700 }}>{appData.stravaConnected ? "✓ CONNECTED" : "NOT CONNECTED"}</div>
              </div>
            </div>
            {!appData.stravaConnected && (
              <div style={{ fontSize: 12, color: "#8a9ab8", fontFamily: "'Barlow',sans-serif", lineHeight: 1.6 }}>
                Connect Strava to import your activities and export your workouts. Requires a free Strava API app.
              </div>
            )}
          </div>

          {!appData.stravaConnected ? (
            <div>
              {/* Setup instructions */}
              <div style={{ background: "#1a1e28", border: "1px solid #2a2e38", borderRadius: 14, padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 11, letterSpacing: 2, color: "#6bbaff", fontWeight: 700, marginBottom: 12 }}>SETUP STEPS</div>
                {[
                  { n: "1", text: "Go to developers.strava.com and sign in" },
                  { n: "2", text: "Click 'Create & Manage Your App'" },
                  { n: "3", text: "Set Authorization Callback Domain to your GitHub Pages URL" },
                  { n: "4", text: "Copy your Client ID and Client Secret" },
                  { n: "5", text: "Paste them below and tap Connect" },
                ].map(s => (
                  <div key={s.n} style={{ display: "flex", gap: 12, marginBottom: 10, alignItems: "flex-start" }}>
                    <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#2a3a4a", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: "#6bbaff", flexShrink: 0 }}>{s.n}</div>
                    <div style={{ fontSize: 12, color: "#8a9ab8", fontFamily: "'Barlow',sans-serif", lineHeight: 1.5, paddingTop: 2 }}>{s.text}</div>
                  </div>
                ))}
              </div>

              {/* Credential inputs */}
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 10, color: "#7a90b0", fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>STRAVA CLIENT ID</div>
                <input value={stravaClientId} onChange={e => setStravaClientId(e.target.value)} placeholder="e.g. 123456"
                  style={{ width: "100%", background: "#1e3d65", border: "1px solid #3a5f8a", borderRadius: 8, padding: "12px 14px", color: "#f0ede6", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 700 }} />
              </div>
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 10, color: "#7a90b0", fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>CLIENT SECRET</div>
                <input type="password" value={stravaSecret} onChange={e => setStravaSecret(e.target.value)} placeholder="Your client secret"
                  style={{ width: "100%", background: "#1e3d65", border: "1px solid #3a5f8a", borderRadius: 8, padding: "12px 14px", color: "#f0ede6", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 700 }} />
              </div>

              <button
                onClick={() => {
                  if (!stravaClientId) { alert("Enter your Strava Client ID first"); return; }
                  update({ stravaClientId });
                  // Store secret in sessionStorage only (never persisted)
                  sessionStorage.setItem("bcfit-strava-secret", stravaSecret);
                  const redirectUri = encodeURIComponent(window.location.href.split("?")[0]);
                  const scope = "activity:read_all,activity:write";
                  window.location.href = `https://www.strava.com/oauth/authorize?client_id=${stravaClientId}&response_type=code&redirect_uri=${redirectUri}&approval_prompt=auto&scope=${scope}`;
                }}
                style={{ width: "100%", background: "#fc4c02", color: "#fff", border: "none", padding: 16, borderRadius: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 16, fontWeight: 800, letterSpacing: 1, cursor: "pointer", marginBottom: 10 }}>
                CONNECT TO STRAVA →
              </button>
              <div style={{ fontSize: 10, color: "#5a7898", fontFamily: "'Barlow',sans-serif", textAlign: "center", lineHeight: 1.5 }}>
                You'll be redirected to Strava to authorize. Your credentials stay on your device only.
              </div>
            </div>
          ) : (
            <div>
              {/* Connected — import/export actions */}
              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
                <button style={{ background: "#1e3d65", border: "1px solid #fc4c0244", borderRadius: 12, padding: 16, display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }}>
                  <div style={{ fontSize: 28 }}>⬇️</div>
                  <div style={{ textAlign: "left" }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#f0ede6", fontFamily: "'Barlow Condensed',sans-serif" }}>Import from Strava</div>
                    <div style={{ fontSize: 11, color: "#7a90b0", fontFamily: "'Barlow',sans-serif" }}>Pull your recent runs, hikes & rides</div>
                  </div>
                  <div style={{ marginLeft: "auto", fontSize: 16, color: "#fc4c02" }}>›</div>
                </button>
                <button style={{ background: "#1e3d65", border: "1px solid #fc4c0244", borderRadius: 12, padding: 16, display: "flex", alignItems: "center", gap: 14, cursor: "pointer" }}>
                  <div style={{ fontSize: 28 }}>⬆️</div>
                  <div style={{ textAlign: "left" }}>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#f0ede6", fontFamily: "'Barlow Condensed',sans-serif" }}>Export to Strava</div>
                    <div style={{ fontSize: 11, color: "#7a90b0", fontFamily: "'Barlow',sans-serif" }}>Push tracked activities to your Strava profile</div>
                  </div>
                  <div style={{ marginLeft: "auto", fontSize: 16, color: "#fc4c02" }}>›</div>
                </button>
              </div>
              <button onClick={() => update({ stravaConnected: false })}
                style={{ width: "100%", background: "none", border: "1px solid #2e5585", borderRadius: 10, padding: 12, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 13, fontWeight: 700, color: "#7a90b0", cursor: "pointer" }}>
                DISCONNECT STRAVA
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Progress ─────────────────────────────────────────────────────────────────
function Progress({ appData, logWeight }) {
  const [weightInput, setWeightInput] = useState("");
  const [logged, setLogged] = useState(false);
  const weeklyData = [18, 42, 55, 38, 61, 52];
  const max = Math.max(...weeklyData);
  const weightLog = appData.weightLog || [];

  const handleLog = () => {
    if (!weightInput) return;
    logWeight(weightInput);
    setWeightInput("");
    setLogged(true);
    setTimeout(() => setLogged(false), 2000);
  };

  const chartMax = weightLog.length ? Math.max(...weightLog.map(e => e.weight)) + 5 : 200;
  const chartMin = weightLog.length ? Math.min(...weightLog.map(e => e.weight)) - 5 : 150;

  return (
    <div className="fade-in">
      {/* Body Weight Logger */}
      <div style={{ background: "#141414", border: "1px solid #1e1e1e", borderRadius: 14, padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 11, letterSpacing: 2, color: "#555", fontWeight: 700, marginBottom: 12 }}>LOG BODY WEIGHT</div>
        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
          <div style={{ flex: 1, position: "relative" }}>
            <input type="number" placeholder="e.g. 185" value={weightInput} onChange={e => setWeightInput(e.target.value)}
              style={{ width: "100%", background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 8, padding: "12px 50px 12px 14px", color: "#f0ede6", fontFamily: "'Barlow Condensed',sans-serif", fontSize: 22, fontWeight: 800 }} />
            <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "#555", fontWeight: 700 }}>LBS</span>
          </div>
          <button onClick={handleLog} style={{ background: logged ? "#1a3a1a" : "#e8ff6b", color: logged ? "#6bffb8" : "#0d0d0d", border: "none", padding: "12px 20px", borderRadius: 8, fontFamily: "'Barlow Condensed',sans-serif", fontSize: 15, fontWeight: 800, cursor: "pointer", transition: "all 0.3s", whiteSpace: "nowrap" }}>
            {logged ? "SAVED ✓" : "LOG IT"}
          </button>
        </div>

        {/* Weight chart */}
        {weightLog.length > 1 ? (
          <div>
            <div style={{ fontSize: 10, color: "#555", letterSpacing: 2, fontWeight: 700, marginBottom: 8 }}>LAST {weightLog.length} ENTRIES</div>
            <svg width="100%" height={80} style={{ overflow: "visible" }}>
              {weightLog.map((entry, i) => {
                if (i === 0) return null;
                const prev = weightLog[i-1];
                const x1 = ((i-1)/(weightLog.length-1))*100;
                const x2 = (i/(weightLog.length-1))*100;
                const y1 = 70 - ((prev.weight - chartMin)/(chartMax - chartMin))*60;
                const y2 = 70 - ((entry.weight - chartMin)/(chartMax - chartMin))*60;
                return <line key={i} x1={`${x1}%`} y1={y1} x2={`${x2}%`} y2={y2} stroke="#e8ff6b" strokeWidth={2} strokeLinecap="round" />;
              })}
              {weightLog.map((entry, i) => {
                const x = (i/(weightLog.length-1))*100;
                const y = 70 - ((entry.weight - chartMin)/(chartMax - chartMin))*60;
                return <circle key={i} cx={`${x}%`} cy={y} r={4} fill="#e8ff6b" />;
              })}
            </svg>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#444", fontWeight: 700, marginTop: 4 }}>
              <span>{weightLog[0]?.date}</span>
              <span style={{ color: "#e8ff6b" }}>{weightLog[weightLog.length-1]?.weight} lbs</span>
              <span>{weightLog[weightLog.length-1]?.date}</span>
            </div>
          </div>
        ) : weightLog.length === 1 ? (
          <div style={{ fontSize: 12, color: "#555", fontFamily: "'Barlow',sans-serif", textAlign: "center", padding: "8px 0" }}>Log one more entry to see your trend chart</div>
        ) : (
          <div style={{ fontSize: 12, color: "#333", fontFamily: "'Barlow',sans-serif", textAlign: "center", padding: "8px 0" }}>No entries yet — log your weight above</div>
        )}
      </div>

      {/* PRs */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 11, letterSpacing: 2, color: "#555", fontWeight: 700, marginBottom: 10 }}>PERSONAL RECORDS</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {[{lift:"Back Squat",weight:"225 lbs",date:"2 weeks ago",icon:"🏋️"},{lift:"Deadlift",weight:"275 lbs",date:"Last week",icon:"💪"},{lift:"Bench Press",weight:"185 lbs",date:"3 weeks ago",icon:"⚡"}].map(pr => (
            <div key={pr.lift} style={{ background: "#141414", border: "1px solid #1e1e1e", borderRadius: 12, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <span style={{ fontSize: 20 }}>{pr.icon}</span>
                <div><div style={{ fontSize: 16, fontWeight: 800 }}>{pr.lift}</div><div style={{ fontSize: 10, color: "#555", letterSpacing: 1, fontWeight: 700 }}>{pr.date}</div></div>
              </div>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#e8ff6b" }}>{pr.weight}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Volume chart */}
      <div style={{ background: "#141414", border: "1px solid #1e1e1e", borderRadius: 14, padding: 16, marginBottom: 16 }}>
        <div style={{ fontSize: 11, letterSpacing: 2, color: "#555", fontWeight: 700, marginBottom: 14 }}>WEEKLY VOLUME (SETS)</div>
        <div style={{ display: "flex", gap: 6, alignItems: "flex-end", height: 80 }}>
          {weeklyData.map((val,i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
              <div style={{ width: "100%", height: `${(val/max)*70}px`, background: i===weeklyData.length-1?"linear-gradient(180deg,#e8ff6b,#b8d44b)":"linear-gradient(180deg,#2a3a2a,#1a2a1a)", borderRadius: "4px 4px 0 0", transition: "height 0.5s ease" }} />
              <div style={{ fontSize: 9, color: "#444", fontWeight: 700 }}>W{i+1}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Body metrics */}
      <div style={{ background: "#141414", border: "1px solid #1e1e1e", borderRadius: 14, padding: 16 }}>
        <div style={{ fontSize: 11, letterSpacing: 2, color: "#555", fontWeight: 700, marginBottom: 14 }}>BODY METRICS</div>
        {[{label:"Body Weight",value: weightLog.length ? `${weightLog[weightLog.length-1].weight} lbs` : "—",change:weightLog.length>1?`${(weightLog[weightLog.length-1].weight-weightLog[0].weight)>0?"+":""}${(weightLog[weightLog.length-1].weight-weightLog[0].weight).toFixed(1)} lbs`:"Log to track",up:weightLog.length>1&&weightLog[weightLog.length-1].weight>weightLog[0].weight},{label:"Body Fat %",value:"16.2%",change:"−0.8%",up:false},{label:"Lean Mass",value:"155 lbs",change:"+1.2 lbs",up:true}].map(m => (
          <div key={m.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid #1a1a1a" }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>{m.label}</div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 18, fontWeight: 800 }}>{m.value}</div>
              <div style={{ fontSize: 11, color: m.up ? "#ff6b6b" : "#6bff9f", fontWeight: 700 }}>{m.change}</div>
            </div>
          </div>
        ))}
        {appData.lastSaved && <div style={{ marginTop: 12, fontSize: 10, color: "#2a2a2a", fontWeight: 700, textAlign: "center" }}>☁ Last saved {new Date(appData.lastSaved).toLocaleString()}</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(BackCountryFit, null));
  </script>
</body>
</html>
