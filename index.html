    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#1a3a5c;height:100%;overflow:hidden;font-family:'Barlow Condensed','Impact',sans-serif;color:#f0ede6}
    #root{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
    ::-webkit-scrollbar{width:0}
    input{outline:none;font-family:'Barlow Condensed',sans-serif}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    button{font-family:'Barlow Condensed',sans-serif;cursor:pointer}
    .fade{animation:fadeUp .35s ease forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .pulse{animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,255,107,.4)}50%{box-shadow:0 0 0 8px rgba(232,255,107,0)}}
    .card{transition:transform .18s;cursor:pointer}
    .card:active{transform:scale(.97)}
    .pbar{height:4px;background:#1e3d65;border-radius:2px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(90deg,#e8ff6b,#6bff9f);border-radius:2px;transition:width .5s}
    .set-btn{width:38px;height:38px;border-radius:50%;border:2px solid #2a4f7a;background:#1e3d65;color:#7a90b0;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
    .set-btn.done{background:#e8ff6b;border-color:#e8ff6b;color:#1a3a5c}
    .water-btn{background:none;border:none;cursor:pointer;transition:transform .15s;display:inline-flex;align-items:center;justify-content:center}
    .water-btn:active{transform:scale(.88)}
    .confetti-piece{position:fixed;top:-10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:300}
    @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    .tab-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:8px 0}
    .strava-orange{color:#fc4c02}
  </style>
</head>

    if(v>=0.3)return partial;
    return "#2a4f7a";
  };
  const op=(k)=>Math.max(0.15,active[k]||0.15);
  return h('div',{style:{display:"flex",gap:8}},
    // Front view
    h('div',{style:{flex:1,textAlign:"center"}},
      h('div',{style:{fontSize:8,color:"#7a90b0",fontWeight:700,letterSpacing:1,marginBottom:4}},"FRONT"),

  return h('div',{style:{position:"fixed",inset:0,background:"rgba(10,20,40,.96)",zIndex:250,display:"flex",flexDirection:"column",fontFamily:"'Barlow Condensed',sans-serif"}},
    h('div',{style:{padding:"20px 20px 0",flexShrink:0}},

const haversine=(a,b)=>{const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lng-a.lng)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};

function MacroRing({value,max,color,size=78,stroke=7,label,unit}){

  return h('div',{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
    h('svg',{width:size,height:size,style:{transform:"rotate(-90deg)"}},
      h('circle',{cx:size/2,cy:size/2,r,fill:"none",stroke:"#1e3d65",strokeWidth:stroke}),
      h('circle',{cx:size/2,cy:size/2,r,fill:"none",stroke:color,strokeWidth:stroke,strokeDasharray:`${dash} ${circ}`,strokeLinecap:"round",style:{transition:"stroke-dasharray .6s ease"}}),

// ── Rest Timer ───────────────────────────────────────────────────────────────────
function RestTimer({onClose}){
  const [secs,setSecs]=useState(90);
  const [init,setInit]=useState(90);
  const [running,setRunning]=useState(true);
  const ref=useRef();
  useEffect(()=>{if(running&&secs>0){ref.current=setInterval(()=>setSecs(s=>s-1),1000);}else clearInterval(ref.current);return()=>clearInterval(ref.current);},[running,secs]);
  const r=54,circ=2*Math.PI*r,pct=secs/init;
  const setT=v=>{setInit(v);setSecs(v);setRunning(true);};
  const fmt=v=>`${Math.floor(v/60)}:${String(v%60).padStart(2,"0")}`;
  return h('div',{style:{position:"fixed",inset:0,background:"rgba(10,20,40,.95)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:200,gap:16}},
    h('div',{style:{fontSize:11,letterSpacing:3,color:"#e8ff6b",fontWeight:700}},"REST TIMER"),
    h('svg',{width:130,height:130,style:{transform:"rotate(-90deg)"}},
      h('circle',{cx:65,cy:65,r,fill:"none",stroke:"#1e3d65",strokeWidth:10}),
      h('circle',{cx:65,cy:65,r,fill:"none",stroke:secs<=10?"#ff6b6b":"#e8ff6b",strokeWidth:10,strokeDasharray:`${pct*circ} ${circ}`,strokeLinecap:"round",style:{transition:"stroke-dasharray .9s linear,stroke .3s"}}),
      h('text',{x:"50%",y:"50%",dominantBaseline:"middle",textAnchor:"middle",style:{fill:"#f0ede6",fontSize:32,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",transform:"rotate(90deg)",transformOrigin:"center"}},fmt(secs))
    ),
    secs===0&&h('div',{style:{fontSize:22,fontWeight:900,color:"#e8ff6b"}},"REST DONE! 💥"),
    h('div',{style:{display:"flex",gap:8}},
      [60,90,120,180].map(v=>h('button',{key:v,onClick:()=>setT(v),style:{padding:"8px 14px",borderRadius:8,border:`1px solid ${init===v?"#e8ff6b":"#2a4f7a"}`,background:init===v?"#1e3058":"#1e3d65",color:init===v?"#e8ff6b":"#7a90b0",fontSize:13,fontWeight:700,cursor:"pointer"}},`${v}s`))
    ),
    h('div',{style:{display:"flex",gap:12}},
      h('button',{onClick:()=>setRunning(r=>!r),style:{padding:"12px 28px",borderRadius:10,border:"none",background:"#1a3458",color:"#e8ff6b",fontSize:15,fontWeight:800,cursor:"pointer"}},running?"PAUSE":"RESUME"),
      h('button',{onClick:onClose,style:{padding:"12px 28px",borderRadius:10,border:"none",background:"#3a1818",color:"#ff9f6b",fontSize:15,fontWeight:800,cursor:"pointer"}},"CLOSE")
    )
  );
}

// ── Today's Workout ───────────────────────────────────────────────────────────────
function TodayWorkout({completedSets,toggleSet,resetDay,setShowTimer}){
  const [exList,setExList]=useState(EXERCISES.map(e=>({...e})));
  const [swapTarget,setSwapTarget]=useState(null); // index of exercise being swapped
  const [expandedEx,setExpandedEx]=useState(null); // index of expanded muscle diagram
  const total=exList.reduce((a,e)=>a+e.sets,0);
  const done=Object.values(completedSets).filter(Boolean).length;
  const pct=Math.round(done/total*100);
  const [confetti,setConfetti]=useState(false);
  const prev=useRef(pct);
  const [started,setStarted]=useState(Object.keys(completedSets).length>0);

  useEffect(()=>{
    if(pct===100&&prev.current!==100){setConfetti(true);setTimeout(()=>setConfetti(false),4500);}
    prev.current=pct;
  },[pct]);

  const handleSwap=(exIdx,newName)=>{
    // Find the new exercise in swap library
    let found=null;
    for(const group of Object.values(SWAP_LIBRARY)){
      const match=group.find(s=>s.name===newName);
      if(match){found=match;break;}
    }
    if(!found)return;
    setExList(prev=>{
      const next=[...prev];
      next[exIdx]={...next[exIdx],name:newName,primary:["Custom"],secondary:[],muscleMap:{}};
      return next;
    });
    setSwapTarget(null);
  };

  // Show start screen if not started
  if(!started){
    return h('div',{className:"fade"},
      h('div',{style:{background:"linear-gradient(135deg,#d4560a 0%,#1a3a5c 100%)",borderRadius:16,padding:24,marginBottom:16,textAlign:"center"}},
        h('div',{style:{fontSize:48,marginBottom:8}},"⚡"),
        h('div',{style:{fontSize:28,fontWeight:900,marginBottom:6}},"UPPER BODY PULL"),
        h('div',{style:{fontSize:14,color:"#ffcca0",fontFamily:"'Barlow',sans-serif",marginBottom:4}},"5 exercises · ~52 min"),
        h('div',{style:{fontSize:12,color:"#ff9f6b",fontFamily:"'Barlow',sans-serif",marginBottom:20}},"Week 6 · Day 4 · Backcountry Build")
      ),
      h('div',{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:20}},
        exList.map(ex=>h(Card,{key:ex.name,style:{padding:"12px 16px"}},
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
            h('div',null,h('div',{style:{fontSize:15,fontWeight:800}},ex.name),h(Label,null,(ex.primary||[]).join(" · "))),
            h('div',{style:{textAlign:"right"}},h('div',{style:{fontSize:13,fontWeight:700,color:"#e8ff6b"}},ex.sets+" × "+ex.reps),h(Label,null,"RIR "+ex.rir))
          ),
          ex.muscleMap&&Object.keys(ex.muscleMap).length>0&&h(MuscleDiagram,{muscleMap:ex.muscleMap})
        ))
      ),
      h('button',{onClick:()=>setStarted(true),className:"pulse",style:{width:"100%",background:"#e8ff6b",color:"#1a3a5c",border:"none",padding:16,borderRadius:12,fontSize:18,fontWeight:900,letterSpacing:1,cursor:"pointer"}},"LET'S GO →")
    );
  }

  return h('div',{className:"fade"},
    confetti&&h(Confetti),
    swapTarget!==null&&h(SwapModal,{exercise:exList[swapTarget],onSwap:(name)=>handleSwap(swapTarget,name),onClose:()=>setSwapTarget(null)}),

    // Header
    h('div',{style:{marginBottom:14}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
        h(Label,null,"WORKOUT PROGRESS"),
        h('div',{style:{display:"flex",alignItems:"center",gap:8}},
          h('button',{onClick:()=>setShowTimer(true),style:{background:"#1e3058",border:"1px solid #2a4f7a",borderRadius:6,padding:"4px 10px",color:"#e8ff6b",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:1}},"⏱ TIMER"),
          h('button',{onClick:()=>{if(confirm("Cancel this workout?"))resetDay();setStarted(false);},style:{background:"none",border:"1px solid #2a4f7a",borderRadius:6,padding:"4px 10px",color:"#7a90b0",fontSize:9,fontWeight:700,letterSpacing:1,cursor:"pointer"}},"✕ CANCEL"),
          h('div',{style:{fontSize:14,fontWeight:800,color:"#e8ff6b"}},pct+"%")
        )
      ),
      h('div',{className:"pbar"},h('div',{className:"pfill",style:{width:pct+"%"}})),
      h('div',{style:{fontSize:11,color:"#7a90b0",marginTop:6}},done+" / "+total+" sets · tap muscle diagram to expand")
    ),

    // Exercises
    h('div',{style:{display:"flex",flexDirection:"column",gap:10}},
      exList.map((ex,ei)=>{
        const exDone=Array.from({length:ex.sets}).every((_,si)=>completedSets[`${ei}-${si}`]);
        const isExpanded=expandedEx===ei;
        return h(Card,{key:ei,style:{padding:16,background:exDone?"#0e2818":"#1e3d65",border:`1px solid ${exDone?"#1e4828":"#2a4f7a"}`,transition:"all .3s"}},
          // Top row: name + sets/rir
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
            h('div',{style:{flex:1}},
              h('div',{style:{fontSize:18,fontWeight:800,lineHeight:1}},ex.name),
              h('div',{style:{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}},
                ...(ex.primary||[]).map(m=>h('span',{key:m,style:{fontSize:9,background:"#e8ff6b22",border:"1px solid #e8ff6b44",borderRadius:4,padding:"2px 6px",color:"#e8ff6b",fontWeight:700}},m)),
                ...(ex.secondary||[]).map(m=>h('span',{key:m,style:{fontSize:9,background:"#6bbaff22",border:"1px solid #6bbaff44",borderRadius:4,padding:"2px 6px",color:"#6bbaff",fontWeight:700}},m))
              )
            ),
            h('div',{style:{textAlign:"right",flexShrink:0,marginLeft:8}},
              h('div',{style:{fontSize:13,fontWeight:700,color:"#e8ff6b"}},ex.sets+" × "+ex.reps),
              h(Label,null,"RIR "+ex.rir)
            )
          ),

          // Muscle diagram (collapsible)
          ex.muscleMap&&Object.keys(ex.muscleMap).length>0&&h('div',{style:{marginBottom:10}},
            h('button',{onClick:()=>setExpandedEx(isExpanded?null:ei),style:{background:"none",border:"none",color:"#6bbaff",fontSize:10,fontWeight:700,letterSpacing:1,cursor:"pointer",marginBottom:isExpanded?10:0,padding:0}},
              isExpanded?"▲ HIDE DIAGRAM":"▼ SHOW MUSCLES"
            ),
            isExpanded&&h(MuscleDiagram,{muscleMap:ex.muscleMap})
          ),

          // Set buttons + swap
          h('div',{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}},
            h('div',{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
              Array.from({length:ex.sets}).map((_,si)=>{
                const k=`${ei}-${si}`;
                return h('button',{key:si,className:"set-btn"+(completedSets[k]?" done":""),onClick:()=>toggleSet(ei,si)},completedSets[k]?"✓":si+1);
              }),
              h('div',{style:{fontSize:10,color:"#4a6080",fontWeight:700,letterSpacing:1}},"LOG")
            ),
            h('button',{onClick:()=>setSwapTarget(ei),style:{background:"#1a3058",border:"1px solid #2a4f7a",borderRadius:8,padding:"6px 10px",color:"#7a90b0",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:1,flexShrink:0}},
              "⇄ SWAP"
            )
          )
        );
      })
    ),

    pct===100&&h('div',{style:{marginTop:16,background:"linear-gradient(135deg,#1e3028,#0e2018)",border:"1px solid #2a4828",borderRadius:14,padding:24,textAlign:"center"}},
      h('div',{style:{fontSize:48,marginBottom:8}},"🏆"),
      h('div',{style:{fontSize:28,fontWeight:900,color:"#e8ff6b",letterSpacing:1}},"WORKOUT COMPLETE"),
      h('div',{style:{fontSize:13,color:"#6b9b6b",fontFamily:"'Barlow',sans-serif",marginTop:6}},"Solid work, Dad. Progress saved automatically.")
    )
  );
}

          h('button',{onClick:()=>removePhotoMeal(m.id),style:{background:"none",border:"none",color:"#ff6b6b",fontSize:16,cursor:"pointer",padding:"4px 8px"}},"✕")

            ),
            h('div',{style:{fontSize:11,color:"#4a6080",fontFamily:"'Barlow',sans-serif",marginBottom:8,lineHeight:1.4}},meal.items.join(" · ")),
            h('div',{style:{display:"flex",gap:10}},
              ...[["P",meal.m.p,"#e8ff6b"],["C",meal.m.c,"#6bffb8"],["F",meal.m.f,"#ff9f6b"]].map(([l,v,c])=>h('div',{key:l,style:{fontSize:10,fontWeight:700}},h('span',{style:{color:"#4a6080"}},l+": "),h('span',{style:{color:c}},v+"g")))

// ── Outdoor (GPS + Strava) ────────────────────────────────────────────────────────
function Outdoor({appData,update}){
  const [sec,setSec]=useState("track");
  const [tState,setTState]=useState("idle"); // idle|active|paused|done
  const [actType,setActType]=useState("run");
  const [elapsed,setElapsed]=useState(0);
  const [route,setRoute]=useState([]);
  const [dist,setDist]=useState(0);
  const [gpsErr,setGpsErr]=useState("");
  const [saveName,setSaveName]=useState("");
  const [showSave,setShowSave]=useState(false);
  const [clientId,setClientId]=useState(appData.mmfClientId||"");
  const [secret,setSecret]=useState("");
  const ivRef=useRef(),watchRef=useRef(),mapRef=useRef(),lMap=useRef(),polyRef=useRef(),markRef=useRef();
  const acts=appData.activities||[];
  const pace=dist>0&&elapsed>0?(elapsed/60)/dist:0;
  const typeIcon={run:"🏃",hike:"🥾",ride:"🚵"};
  const typeLabel={run:"RUN",hike:"HIKE",ride:"RIDE"};

  useEffect(()=>{
    if(sec!=="track"||lMap.current)return;
    const t=setTimeout(()=>{if(window.L&&mapRef.current&&!lMap.current)initMap();},400);
    return()=>clearTimeout(t);
  },[sec]);

  useEffect(()=>{return()=>{clearInterval(ivRef.current);if(watchRef.current)navigator.geolocation?.clearWatch(watchRef.current);};},[]);

  useEffect(()=>{
    if(!lMap.current||route.length===0)return;
    const ll=route.map(p=>[p.lat,p.lng]);
    polyRef.current?.setLatLngs(ll);
    const last=route[route.length-1];
    markRef.current?.setLatLng([last.lat,last.lng]);
    lMap.current.setView([last.lat,last.lng]);
  },[route]);

  const initMap=()=>{
    if(!mapRef.current||lMap.current||!window.L)return;
    const c=[47.5615,-52.7126];
    const map=window.L.map(mapRef.current,{zoomControl:false,attributionControl:false}).setView(c,14);
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
    window.L.control.zoom({position:"bottomright"}).addTo(map);
    const poly=window.L.polyline([],{color:"#e8ff6b",weight:5,opacity:.9}).addTo(map);
    const icon=window.L.divIcon({html:'<div style="width:14px;height:14px;background:#e8ff6b;border:3px solid #1a3a5c;border-radius:50%;box-shadow:0 0 10px #e8ff6b99;"></div>',iconSize:[14,14],iconAnchor:[7,7],className:""});
    const marker=window.L.marker(c,{icon}).addTo(map);
    lMap.current=map;polyRef.current=poly;markRef.current=marker;
  };

  const startTracking=()=>{
    setGpsErr("");
    if(!navigator.geolocation){setGpsErr("GPS not available.");return;}
    setTState("active");setElapsed(0);setRoute([]);setDist(0);
    ivRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    watchRef.current=navigator.geolocation.watchPosition(
      pos=>{const pt={lat:pos.coords.latitude,lng:pos.coords.longitude};setRoute(prev=>{if(prev.length>0)setDist(d=>d+haversine(prev[prev.length-1],pt));return[...prev,pt];});},
      e=>setGpsErr("GPS error: "+e.message),{enableHighAccuracy:true,maximumAge:2000,timeout:10000}
    );
  };
  const pauseTracking=()=>{setTState("paused");clearInterval(ivRef.current);navigator.geolocation.clearWatch(watchRef.current);};
  const resumeTracking=()=>{
    setTState("active");
    ivRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    watchRef.current=navigator.geolocation.watchPosition(pos=>{const pt={lat:pos.coords.latitude,lng:pos.coords.longitude};setRoute(prev=>{if(prev.length>0)setDist(d=>d+haversine(prev[prev.length-1],pt));return[...prev,pt];});},e=>setGpsErr("GPS: "+e.message),{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
  };
  const stopTracking=()=>{
    clearInterval(ivRef.current);navigator.geolocation.clearWatch(watchRef.current);
    setTState("done");setShowSave(true);
    setSaveName((actType==="run"?"Run":actType==="hike"?"Hike":"Ride")+" — "+new Date().toLocaleDateString());
  };
  const cancelTracking=()=>{
    clearInterval(ivRef.current);if(watchRef.current)navigator.geolocation.clearWatch(watchRef.current);
    setTState("idle");setRoute([]);setDist(0);setElapsed(0);setShowSave(false);
    lMap.current=null;
  };
  const saveActivity=()=>{
    const a={id:Date.now(),type:actType,name:saveName,date:new Date().toLocaleDateString(),distance:parseFloat(dist.toFixed(3)),duration:elapsed,route};
    update({activities:[a,...acts].slice(0,50)});
    setShowSave(false);setTState("idle");setRoute([]);setDist(0);setElapsed(0);lMap.current=null;
  };

  return h('div',{className:"fade",style:{paddingBottom:20}},
    // Tabs
    h('div',{style:{display:"flex",gap:6,marginBottom:14}},
      ...[["track","🗺 TRACK"],["history","📋 HISTORY"],["mmf","🔵 MAPMYFIT"]].map(([id,l])=>
        h('button',{key:id,onClick:()=>{setSec(id);if(id==="track")lMap.current=null;},style:{flex:1,padding:"9px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,letterSpacing:1,background:sec===id?"#e8ff6b":"#1e3d65",color:sec===id?"#1a3a5c":"#7a90b0",transition:"all .2s"}},l)
      )
    ),

    // TRACK
    sec==="track"&&h('div',null,
      tState==="idle"&&h('div',{style:{display:"flex",gap:8,marginBottom:10}},
        ...(["run","hike","ride"].map(t=>h('button',{key:t,onClick:()=>setActType(t),style:{flex:1,padding:"10px 4px",borderRadius:10,border:`2px solid ${actType===t?"#e8ff6b":"#2a4f7a"}`,background:actType===t?"#1e3058":"#1e3d65",cursor:"pointer",fontSize:13,fontWeight:800,color:actType===t?"#e8ff6b":"#7a90b0",transition:"all .2s"}},typeIcon[t]+" "+typeLabel[t])))
      ),
      h('div',{ref:mapRef,style:{width:"100%",height:260,background:"#1e3d65",borderRadius:12,overflow:"hidden",marginBottom:12}}),
      tState!=="idle"&&h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}},
        ...[["TIME",fmtTime(elapsed)],["DIST",fmtDist(dist)],["PACE",pace>0?`${Math.floor(pace)}:${String(Math.round((pace%1)*60)).padStart(2,"0")}/km`:"--"]].map(([l,v])=>
          h(Card,{key:l,style:{padding:"10px 8px",textAlign:"center"}},h('div',{style:{fontSize:17,fontWeight:900,color:"#e8ff6b",lineHeight:1}},v),h(Label,{style:{marginTop:2}},l))
        )
      ),
      gpsErr&&h('div',{style:{fontSize:11,color:"#ff9f6b",fontFamily:"'Barlow',sans-serif",marginBottom:8}},"⚠ "+gpsErr),
      tState==="idle"&&h('button',{onClick:startTracking,className:"pulse",style:{width:"100%",background:"#e8ff6b",color:"#1a3a5c",border:"none",padding:16,borderRadius:12,fontSize:18,fontWeight:900,cursor:"pointer",letterSpacing:1}},"START "+typeLabel[actType]+" →"),
      tState==="active"&&h('div',{style:{display:"flex",gap:8}},
        h('button',{onClick:pauseTracking,style:{flex:1,background:"#1e3d65",border:"1px solid #2a4f7a",padding:14,borderRadius:12,fontSize:16,fontWeight:800,color:"#e8ff6b",cursor:"pointer"}},"⏸ PAUSE"),
        h('button',{onClick:stopTracking,style:{flex:1,background:"#3e1818",border:"1px solid #5e2828",padding:14,borderRadius:12,fontSize:16,fontWeight:800,color:"#ff9f6b",cursor:"pointer"}},"⏹ FINISH"),
        h('button',{onClick:()=>{if(confirm("Cancel this activity?"))cancelTracking();},style:{background:"#1e3d65",border:"1px solid #2a4f7a",padding:"14px 16px",borderRadius:12,fontSize:14,fontWeight:800,color:"#7a90b0",cursor:"pointer"}},"✕")
      ),
      tState==="paused"&&h('div',{style:{display:"flex",gap:8}},
        h('button',{onClick:resumeTracking,style:{flex:2,background:"#1e3028",border:"1px solid #2e4828",padding:14,borderRadius:12,fontSize:16,fontWeight:800,color:"#6bffb8",cursor:"pointer"}},"▶ RESUME"),
        h('button',{onClick:stopTracking,style:{flex:1,background:"#3e1818",border:"1px solid #5e2828",padding:14,borderRadius:12,fontSize:16,fontWeight:800,color:"#ff9f6b",cursor:"pointer"}},"⏹ END"),
        h('button',{onClick:()=>{if(confirm("Cancel this activity?"))cancelTracking();},style:{background:"#1e3d65",border:"1px solid #2a4f7a",padding:"14px 16px",borderRadius:12,fontSize:14,fontWeight:800,color:"#7a90b0",cursor:"pointer"}},"✕")
      ),
      showSave&&h('div',{style:{marginTop:12,background:"#0e2818",border:"1px solid #2a4828",borderRadius:14,padding:16}},
        h(Label,{style:{marginBottom:10}},"SAVE ACTIVITY"),
        h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}},
          ...[["DISTANCE",fmtDist(dist)],["TIME",fmtTime(elapsed)],["TYPE",typeLabel[actType]]].map(([l,v])=>
            h('div',{key:l,style:{textAlign:"center"}},h('div',{style:{fontSize:16,fontWeight:900,color:"#e8ff6b"}},v),h(Label,null,l))
          )
        ),
        h('input',{value:saveName,onChange:e=>setSaveName(e.target.value),style:{width:"100%",background:"#1e3d65",border:"1px solid #2a4f7a",borderRadius:8,padding:"10px 12px",color:"#f0ede6",fontSize:15,marginBottom:10}}),
        h('div',{style:{display:"flex",gap:8}},
          h('button',{onClick:saveActivity,style:{flex:2,background:"#e8ff6b",color:"#1a3a5c",border:"none",padding:12,borderRadius:8,fontSize:15,fontWeight:800,cursor:"pointer"}},"SAVE ✓"),
          h('button',{onClick:cancelTracking,style:{flex:1,background:"none",border:"1px solid #2a4f7a",padding:12,borderRadius:8,fontSize:13,fontWeight:700,color:"#7a90b0",cursor:"pointer"}},"DISCARD")
        )
      )
    ),

    // HISTORY
    sec==="history"&&h('div',null,
      acts.length===0
        ?h('div',{style:{textAlign:"center",padding:"40px 20px"}},h('div',{style:{fontSize:48,marginBottom:12}},"🥾"),h('div',{style:{fontSize:18,fontWeight:800,marginBottom:6}},"NO ACTIVITIES YET"),h('div',{style:{fontSize:12,color:"#7a90b0",fontFamily:"'Barlow',sans-serif"}},"Start a run, hike, or ride on the Track tab."))
        :h('div',null,
          h(Label,{style:{marginBottom:10}},acts.length+" ACTIVITIES LOGGED"),
          acts.map(a=>h(Card,{key:a.id,style:{padding:16,marginBottom:10}},
            h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
              h('div',{style:{display:"flex",gap:10,alignItems:"center"}},
                h('div',{style:{fontSize:28}},typeIcon[a.type]||"🏃"),
                h('div',null,h('div',{style:{fontSize:16,fontWeight:800,lineHeight:1}},a.name),h(Label,{style:{marginTop:2}},a.date))
              ),
              h('button',{onClick:()=>update({activities:acts.filter(x=>x.id!==a.id)}),style:{background:"none",border:"none",color:"#ff6b6b",fontSize:16,cursor:"pointer",padding:"2px 6px"}},"✕")
            ),
            h('div',{style:{display:"flex",gap:14}},
              ...[["DIST",fmtDist(a.distance)],["TIME",fmtTime(a.duration)],["PACE",a.duration>0&&a.distance>0?Math.floor((a.duration/60)/a.distance)+":"+String(Math.round(((a.duration/60)/a.distance%1)*60)).padStart(2,"0")+"/km":"--"]].map(([l,v])=>
                h('div',{key:l},h('div',{style:{fontSize:18,fontWeight:900,color:"#e8ff6b"}},v),h(Label,null,l))
              )
            )
          ))
        )
    ),

    // MAPMYFITNESS
    sec==="mmf"&&h('div',null,
      // Status card
      h(Card,{style:{padding:18,marginBottom:14,background:appData.mmfConnected?"#0e1828":"#1e3d65",border:`1px solid ${appData.mmfConnected?"#1e3458":"#2a4f7a"}`}},
        h('div',{style:{display:"flex",alignItems:"center",gap:14,marginBottom:appData.mmfConnected?0:12}},
          h('div',{style:{width:46,height:46,borderRadius:12,background:"#1565c0",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
            h('svg',{width:28,height:28,viewBox:"0 0 24 24",fill:"none"},
              h('path',{d:"M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z",fill:"#fff"}),
              h('circle',{cx:12,cy:9,r:2.5,fill:"#1565c0"})
            )
          ),
          h('div',null,
            h('div',{style:{fontSize:20,fontWeight:900}},"MapMyFitness"),
            h('div',{style:{fontSize:11,color:appData.mmfConnected?"#6bffb8":"#ff9f6b",fontWeight:700,letterSpacing:1}},appData.mmfConnected?"✓ CONNECTED":"NOT CONNECTED"),
            h('div',{style:{fontSize:10,color:"#4a6080",fontFamily:"'Barlow',sans-serif",marginTop:2}},"by Under Armour")
          )

        !appData.mmfConnected&&h('div',{style:{fontSize:12,color:"#7a90b0",fontFamily:"'Barlow',sans-serif",lineHeight:1.6,marginTop:4}},"Connect MapMyFitness to import your workouts and routes, and export your tracked activities.")
      ),

      !appData.mmfConnected

              ["1","Go to developer.underarmour.com and sign in"],
              ["2","Click 'Create Application' and fill in your app details"],
              ["3","Set your Redirect URI to your GitHub Pages URL"],
              ["4","Copy your Client ID and Client Secret from the dashboard"],
              ["5","Paste them below and tap Connect"],
            ].map(([n,t])=>
              h('div',{key:n,style:{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}},
                h('div',{style:{width:22,height:22,borderRadius:"50%",background:"#1565c0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff",flexShrink:0}},n),
                h('div',{style:{fontSize:12,color:"#7a90b0",fontFamily:"'Barlow',sans-serif",lineHeight:1.5,paddingTop:2}},t)
              )

          h('div',{style:{marginBottom:10}},
            h(Label,{style:{marginBottom:6}},"CLIENT ID"),
            h('input',{value:clientId,onChange:e=>setClientId(e.target.value),placeholder:"Your Under Armour Client ID",style:{width:"100%",background:"#1e3d65",border:"1px solid #2a4f7a",borderRadius:8,padding:"12px 14px",color:"#f0ede6",fontSize:16,fontWeight:700}})
          ),
          h('div',{style:{marginBottom:16}},
            h(Label,{style:{marginBottom:6}},"CLIENT SECRET"),

          ),

                h('div',{style:{textAlign:"left"}},
                  h('div',{style:{fontSize:16,fontWeight:800,color:"#f0ede6"}},t),
                  h('div',{style:{fontSize:11,color:"#7a90b0",fontFamily:"'Barlow',sans-serif"}},s)
                ),
                h('div',{style:{marginLeft:"auto",fontSize:16,color:"#6bbaff"}},"›")
              )
            )
          ),
          // Last sync info
          h(Card,{style:{padding:14,marginBottom:14,background:"#0e1828"}},
            h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h('div',null,h(Label,null,"LAST SYNCED"),h('div',{style:{fontSize:14,fontWeight:800,marginTop:2}},"Never")),
              h('button',{style:{background:"#1565c0",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",fontSize:12,fontWeight:800,cursor:"pointer"}},"SYNC NOW")
            )
          ),
          h('button',{onClick:()=>update({mmfConnected:false}),style:{width:"100%",background:"none",border:"1px solid #2a4f7a",borderRadius:10,padding:12,fontSize:13,fontWeight:700,color:"#7a90b0",cursor:"pointer"}},"DISCONNECT MAPMYFITNESS")
        )
    )
  );
}

// ── Progress ──────────────────────────────────────────────────────────────────────
function Progress({appData,logWeight}){
  const [wIn,setWIn]=useState("");
  const [saved,setSaved]=useState(false);
  const log=appData.weightLog||[];
  const doLog=()=>{if(!wIn)return;logWeight(wIn);setWIn("");setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const wMax=log.length?Math.max(...log.map(e=>e.weight))+5:220;
  const wMin=log.length?Math.min(...log.map(e=>e.weight))-5:150;

  return h('div',{className:"fade"},
    // Weight logger
    h(Card,{style:{padding:16,marginBottom:14}},
      h(Label,{style:{marginBottom:12}},"LOG BODY WEIGHT"),
      h('div',{style:{display:"flex",gap:10,marginBottom:12}},
        h('div',{style:{flex:1,position:"relative"}},
          h('input',{type:"number",placeholder:"e.g. 185",value:wIn,onChange:e=>setWIn(e.target.value),style:{width:"100%",background:"#1a3a5c",border:"1px solid #2a4f7a",borderRadius:8,padding:"12px 50px 12px 14px",color:"#f0ede6",fontSize:22,fontWeight:800}}),
          h('span',{style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"#4a6080",fontWeight:700}},"LBS")
        ),
        h('button',{onClick:doLog,style:{background:saved?"#1e3028":"#e8ff6b",color:saved?"#6bffb8":"#1a3a5c",border:"none",padding:"12px 20px",borderRadius:8,fontSize:15,fontWeight:800,cursor:"pointer",transition:"all .3s",whiteSpace:"nowrap"}},saved?"SAVED ✓":"LOG IT")
      ),
      log.length>1
        ?h('div',null,
          h(Label,{style:{marginBottom:8}},"LAST "+log.length+" ENTRIES"),
          h('svg',{width:"100%",height:80,style:{overflow:"visible"}},
            log.map((e,i)=>{
              if(i===0)return null;
              const prev=log[i-1];
              const x1=(i-1)/(log.length-1)*100,x2=i/(log.length-1)*100;
              const y1=70-(prev.weight-wMin)/(wMax-wMin)*60,y2=70-(e.weight-wMin)/(wMax-wMin)*60;
              return h('line',{key:i,x1:`${x1}%`,y1,x2:`${x2}%`,y2,stroke:"#e8ff6b",strokeWidth:2,strokeLinecap:"round"});
            }),
            log.map((e,i)=>h('circle',{key:"d"+i,cx:`${i/(log.length-1)*100}%`,cy:70-(e.weight-wMin)/(wMax-wMin)*60,r:4,fill:"#e8ff6b"}))
          ),
          h('div',{style:{display:"flex",justifyContent:"space-between",fontSize:9,color:"#4a6080",fontWeight:700,marginTop:4}},
            h('span',null,log[0]?.date),
            h('span',{style:{color:"#e8ff6b"}},log[log.length-1]?.weight+" lbs"),
            h('span',null,log[log.length-1]?.date)
          )
        )
        :h('div',{style:{fontSize:12,color:log.length===0?"#2a4f7a":"#4a6080",fontFamily:"'Barlow',sans-serif",textAlign:"center",padding:"8px 0"}},log.length===0?"No entries yet — log your weight above":"Log one more entry to see your trend chart")
    ),
    // PRs
    h(Label,{style:{marginBottom:10}},"PERSONAL RECORDS"),
    h('div',{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:14}},
      ...[{lift:"Back Squat",weight:"225 lbs",date:"2 weeks ago",icon:"🏋️"},{lift:"Deadlift",weight:"275 lbs",date:"Last week",icon:"💪"},{lift:"Bench Press",weight:"185 lbs",date:"3 weeks ago",icon:"⚡"}].map(pr=>
        h(Card,{key:pr.lift,style:{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h('div',{style:{display:"flex",gap:10,alignItems:"center"}},
            h('span',{style:{fontSize:20}},pr.icon),
            h('div',null,h('div',{style:{fontSize:16,fontWeight:800}},pr.lift),h(Label,{style:{marginTop:2}},pr.date))
          ),
          h('div',{style:{fontSize:22,fontWeight:900,color:"#e8ff6b"}},pr.weight)
        )
      )
    ),
    // Volume chart
    h(Card,{style:{padding:16,marginBottom:14}},
      h(Label,{style:{marginBottom:14}},"WEEKLY VOLUME (SETS)"),
      h('div',{style:{display:"flex",gap:6,alignItems:"flex-end",height:80}},
        ...[18,42,55,38,61,52].map((v,i,arr)=>{
          const mx=Math.max(...arr);
          return h('div',{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
            h('div',{style:{width:"100%",height:`${v/mx*70}px`,background:i===arr.length-1?"linear-gradient(180deg,#e8ff6b,#b8d43b)":"linear-gradient(180deg,#2a4f7a,#1e3d65)",borderRadius:"4px 4px 0 0",transition:"height .5s"}}),
            h('div',{style:{fontSize:9,color:"#4a6080",fontWeight:700}},"W"+(i+1))
          );
        })
      )
    ),
    // Body metrics
    h(Card,{style:{padding:16}},
      h(Label,{style:{marginBottom:14}},"BODY METRICS"),
      ...[
        {l:"Body Weight",v:log.length?log[log.length-1].weight+" lbs":"—",ch:log.length>1?((log[log.length-1].weight-log[0].weight)>0?"+":"")+((log[log.length-1].weight-log[0].weight).toFixed(1))+" lbs":"Log to track",up:log.length>1&&log[log.length-1].weight>log[0].weight},
        {l:"Body Fat %",v:"16.2%",ch:"−0.8%",up:false},
        {l:"Lean Mass",v:"155 lbs",ch:"+1.2 lbs",up:true}
      ].map(m=>h('div',{key:m.l,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #1e3d65"}},
        h('div',{style:{fontSize:14,fontWeight:600}},m.l),
        h('div',{style:{textAlign:"right"}},h('div',{style:{fontSize:18,fontWeight:800}},m.v),h('div',{style:{fontSize:11,color:m.up?"#ff6b6b":"#6bff9f",fontWeight:700}},m.ch))
      )),
      appData.lastSaved&&h('div',{style:{marginTop:12,fontSize:10,color:"#2a4f7a",fontWeight:700,textAlign:"center"}},"☁ Last saved "+new Date(appData.lastSaved).toLocaleString())
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dashboard");
  const [saveStatus,setSaveStatus]=useState("idle");
  const [loaded,setLoaded]=useState(false);
  const [data,setData]=useState(DEFAULTS);
  const [showTimer,setShowTimer]=useState(false);
  const [showPhoto,setShowPhoto]=useState(false);
  const [showMacroEditor,setShowMacroEditor]=useState(false);
  const [selProgram,setSelProgram]=useState(null);

  useEffect(()=>{
    try{const r=localStorage.getItem(STORAGE_KEY);if(r)setData({...DEFAULTS,...JSON.parse(r)});}catch{}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    setSaveStatus("saving");
    const t=setTimeout(()=>{
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify({...data,lastSaved:new Date().toISOString()}));setSaveStatus("saved");setTimeout(()=>setSaveStatus("idle"),2000);}
      catch{setSaveStatus("error");}
    },700);
    return()=>clearTimeout(t);
  },[data,loaded]);

  const update=useCallback(patch=>setData(p=>({...p,...patch})),[]);
  const toggleSet=useCallback((ei,si)=>{const k=`${ei}-${si}`;setData(p=>({...p,completedSets:{...p.completedSets,[k]:!p.completedSets[k]}}));setShowTimer(true);},[]);
  const toggleMeal=useCallback(i=>setData(p=>({...p,loggedMeals:{...p.loggedMeals,[i]:!p.loggedMeals[i]}})),[]);
  const setWater=useCallback(v=>setData(p=>({...p,water:typeof v==="function"?v(p.water):v})),[]);
  const resetDay=useCallback(()=>setData(p=>({...p,completedSets:{},loggedMeals:{},water:0,photoMeals:[]})),[]);
  const addPhotoMeal=useCallback(m=>setData(p=>({...p,photoMeals:[...(p.photoMeals||[]),{...m,id:Date.now(),time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]})),[]);
  const removePhotoMeal=useCallback(id=>setData(p=>({...p,photoMeals:p.photoMeals.filter(m=>m.id!==id)})),[]);
  const saveMacros=useCallback(t=>setData(p=>({...p,macroTargets:t})),[]);
  const logWeight=useCallback(w=>{
    const entry={date:new Date().toLocaleDateString(),weight:parseFloat(w)};
    setData(p=>{const log=[...(p.weightLog||[])];const ti=log.findIndex(e=>e.date===entry.date);if(ti>=0)log[ti]=entry;else log.push(entry);return{...p,weightLog:log.slice(-30)};});
  },[]);

  const targets=data.macroTargets||DEFAULTS.macroTargets;
  const consumed=[...MEALS.filter((_,i)=>data.loggedMeals[i]).map(m=>m.m),...(data.photoMeals||[]).map(m=>({cal:m.cal,p:m.p,c:m.c,f:m.f}))].reduce((a,m)=>({cal:a.cal+m.cal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f}),{cal:0,p:0,c:0,f:0});

  const TABS=[{id:"dashboard",icon:"⊞",label:"HOME"},{id:"programs",icon:"▤",label:"PROGRAMS"},{id:"today",icon:"⚡",label:"WORKOUT"},{id:"outdoor",icon:"🗺",label:"OUTDOOR"},{id:"nutrition",icon:"🥦",label:"NUTRITION"},{id:"progress",icon:"◈",label:"PROGRESS"}];
  const TITLES={dashboard:"YOUR DASHBOARD",programs:"PROGRAMS",today:"TODAY'S WORKOUT",outdoor:"OUTDOOR",nutrition:"NUTRITION",progress:"PROGRESS"};

  if(!loaded)return h('div',{style:{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
    h('div',{style:{fontSize:48}},"🏔️"),
    h('div',{style:{fontSize:11,letterSpacing:3,color:"#e8ff6b",fontWeight:700}},"BACKCOUNTRY FIT"),
    h('div',{style:{fontSize:13,color:"#4a6080",fontWeight:600,letterSpacing:1}},"LOADING…")
  );

  return h('div',{style:{height:"100vh",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}},
    // Modals
    showTimer&&h(RestTimer,{onClose:()=>setShowTimer(false)}),
    showPhoto&&h(PhotoLogger,{onAdd:addPhotoMeal,onClose:()=>setShowPhoto(false)}),
    showMacroEditor&&h(MacroEditor,{targets,onSave:saveMacros,onClose:()=>setShowMacroEditor(false)}),

    // Header
    h('div',{style:{padding:"20px 20px 12px",flexShrink:0}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
        h('div',null,
          h('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:2}},
            h('div',{style:{fontSize:11,letterSpacing:3,color:"#e8ff6b",fontWeight:700}},"BACKCOUNTRY FIT"),
            h(SaveBadge,{status:saveStatus})
          ),
          h('div',{style:{fontSize:28,fontWeight:900,lineHeight:1,letterSpacing:-.5}},TITLES[tab])
        ),
        // Dumbbell avatar
        h('div',{style:{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#e8ff6b,#b8d43b)",border:"2px solid #e8ff6b",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          h('svg',{width:24,height:24,viewBox:"0 0 24 24",fill:"none",stroke:"#1a3a5c",strokeWidth:2.5,strokeLinecap:"round",strokeLinejoin:"round"},
            h('rect',{x:2,y:10,width:3,height:4,rx:1}),
            h('rect',{x:19,y:10,width:3,height:4,rx:1}),
            h('rect',{x:5,y:8,width:3,height:8,rx:1}),
            h('rect',{x:16,y:8,width:3,height:8,rx:1}),
            h('line',{x1:8,y1:12,x2:16,y2:12,strokeWidth:3})
          )
        )
      )
    ),

    // Content
    h('div',{style:{flex:1,overflowY:"auto",padding:tab==="outdoor"?"0 0 4px":"0 20px 4px"}},
      tab==="dashboard"&&h(Dashboard,{setTab,appData:data,consumed,targets}),
      tab==="programs"&&h(Programs,null),
      tab==="today"&&h(TodayWorkout,{completedSets:data.completedSets,toggleSet,resetDay,setShowTimer}),
      tab==="nutrition"&&h(Nutrition,{consumed,loggedMeals:data.loggedMeals,toggleMeal,water:data.water,setWater,targets,setShowMacroEditor:()=>setShowMacroEditor(true),setShowPhotoLogger:()=>setShowPhoto(true),photoMeals:data.photoMeals||[],removePhotoMeal}),
      tab==="outdoor"&&h(Outdoor,{appData:data,update}),
      tab==="progress"&&h(Progress,{appData:data,logWeight}),
      h('div',{style:{height:20}})
    ),

    // Bottom nav
    h('div',{style:{background:"#0e2040",borderTop:"1px solid #1e3d65",display:"flex",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom,0px)"}},
      TABS.map(t=>h('button',{key:t.id,className:"tab-btn",onClick:()=>setTab(t.id),style:{color:tab===t.id?"#e8ff6b":"#4a6080",transition:"color .2s"}},
        h('span',{style:{fontSize:tab===t.id?19:17}},t.icon),
        h('span',{style:{fontSize:7,fontWeight:700,letterSpacing:.5}},t.label)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
